# Perfil PROD: despliegue remoto (Railway/Render). Datos sensibles via variables de entorno.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false

# URL del microservicio de pedidos inyectada por el entorno (ej. ruta interna del Gateway/host remoto)
ms-pedidos:
  url: ${MS_PEDIDOS_URL}
