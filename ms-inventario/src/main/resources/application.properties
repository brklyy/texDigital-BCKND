spring.application.name=ms-inventario
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/db_inventario?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

logging.level.cl.texDigital.ms_inventario=DEBUG
logging.level.org.springframework.web=INFO
logging.level.liquibase=INFO
