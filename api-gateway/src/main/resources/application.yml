spring:
  application:
    name: api-gateway
  profiles:
    active: dev

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: ${LOG_LEVEL:INFO}
    reactor.netty: INFO
