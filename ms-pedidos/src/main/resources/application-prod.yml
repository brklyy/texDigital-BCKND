# Perfil PROD: despliegue remoto (Railway/Render). Datos sensibles via variables de entorno.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false

# URLs de los microservicios consumidos, inyectadas por el entorno
ms-clientes:
  url: ${MS_CLIENTES_URL}
ms-productos:
  url: ${MS_PRODUCTOS_URL}
