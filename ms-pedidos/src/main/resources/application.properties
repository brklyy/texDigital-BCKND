spring.application.name=ms-pedidos
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/db_pedidos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

logging.level.cl.texDigital.ms_pedidos=DEBUG
logging.level.org.springframework.web=INFO
logging.level.liquibase=INFO

ms-clientes.url=http://localhost:8082
ms-productos.url=http://localhost:8084
