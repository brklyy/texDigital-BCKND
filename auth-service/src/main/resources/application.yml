spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: ${SERVER_PORT:8090}

jwt:
  secret: ${JWT_SECRET:texDigitalSecretKey2026AuthServiceJWTHS256Algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    cl.texDigital.auth_service: ${LOG_LEVEL:DEBUG}
    org.springframework.web: INFO
    liquibase: INFO
